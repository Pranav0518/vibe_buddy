<!DOCTYPE html>
<html>

<head>

    <title>Player</title>

    <link rel="icon" href="/favicon.ico">

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:20px;
        }

        #thumbnail{
            width:400px;
            border-radius:12px;
        }

        .recommendation{

            display:flex;

            gap:10px;

            margin:10px 0;

            cursor:pointer;

            border:1px solid #ddd;

            padding:10px;

            border-radius:10px;
        }

        .recommendation:hover{
            background:#f5f5f5;
        }

        .recommendation img{
            width:120px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<h1>Now Playing</h1>

<img id="thumbnail">

<h2 id="title"></h2>

<p id="artist"></p>

<audio
    id="player"
    controls
    autoplay>
</audio>

<hr>

<h2>Recommended Songs</h2>

<div id="recommendations"></div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const videoId =
    params.get(
        "videoId"
    );

async function loadSong(){

    const response =
        await fetch(
            `/song/${videoId}`
        );

    const data =
        await response.json();

    document
        .getElementById(
            "thumbnail"
        )
        .src =
        data.thumbnail;

    document
        .getElementById(
            "title"
        )
        .innerText =
        data.title;

    document
        .getElementById(
            "artist"
        )
        .innerText =
        data.artist;

    const player =
        document
        .getElementById(
            "player"
        );

    player.src =
        data.audioUrl;

    player.play();
}

async function loadRecommendations(){

    const response =
        await fetch(
            `/recommend/${videoId}`
        );

    const songs =
        await response.json();

    const container =
        document
        .getElementById(
            "recommendations"
        );

    container.innerHTML = "";

    songs.forEach(song => {

        container.innerHTML += `

        <div

            class="recommendation"

            onclick="
                location.href=
                '/player?videoId=${song.videoId}'
            ">

            <img
                src="${song.thumbnail}">

            <div>

                <h3>
                    ${song.title}
                </h3>

                <p>
                    ${song.artist}
                </p>

            </div>

        </div>

        `;
    });
}

loadSong();

loadRecommendations();

</script>

</body>

</html>
