<!DOCTYPE html>
<html>

<head>

    <title>Vibe Buddy</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:20px;
        }

        #searchContainer{
            margin-bottom:20px;
        }

        #searchBox{
            width:300px;
            padding:10px;
        }

        button{
            padding:10px;
        }

        .song-card{

            display:flex;

            gap:15px;

            margin:10px 0;

            padding:10px;

            border:1px solid #ddd;

            border-radius:12px;

            cursor:pointer;
        }

        .song-card:hover{
            background:#f5f5f5;
        }

        .thumbnail{
            width:160px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<h1>Vibe Buddy</h1>

<div id="searchContainer">

    <input
        id="searchBox"
        placeholder="Search Song"
        onkeypress="
            if(event.key==='Enter')
                searchSongs()
        ">

    <button onclick="searchSongs()">
        Search
    </button>

</div>

<div id="results"></div>

<script>

let offset = 0;

let currentQuery = "";

let loading = false;

async function searchSongs(){

    currentQuery =
        document.getElementById(
            "searchBox"
        ).value;

    offset = 0;

    const response =
        await fetch(
            `/search?query=${encodeURIComponent(
                currentQuery
            )}&offset=0`
        );

    const songs =
        await response.json();

    const results =
        document.getElementById(
            "results"
        );

    results.innerHTML = "";

    songs.forEach(song => {

        results.innerHTML += `

        <div
            class="song-card"

            onclick="
                location.href=
                '/player?videoId=${song.videoId}'
            ">

            <img
                class="thumbnail"

                src="${song.thumbnail}"

                onerror="
                    this.src=
                    '${song.fallbackThumbnail}'
                ">

            <div>

                <h3>
                    ${song.title}
                </h3>

                <p>
                    ${song.artist}
                </p>

            </div>

        </div>

        `;
    });
}

async function loadMoreSongs(){

    if(
        loading ||
        currentQuery === ""
    )
        return;

    loading = true;

    offset += 20;

    const response =
        await fetch(
            `/search?query=${encodeURIComponent(
                currentQuery
            )}&offset=${offset}`
        );

    const songs =
        await response.json();

    const results =
        document.getElementById(
            "results"
        );

    songs.forEach(song => {

        results.innerHTML += `

        <div
            class="song-card"

            onclick="
                location.href=
                '/player?videoId=${song.videoId}'
            ">

            <img
                class="thumbnail"

                src="${song.thumbnail}"

                onerror="
                    this.src=
                    '${song.fallbackThumbnail}'
                ">

            <div>

                <h3>
                    ${song.title}
                </h3>

                <p>
                    ${song.artist}
                </p>

            </div>

        </div>

        `;
    });

    loading = false;
}

window.addEventListener(
    "scroll",
    () => {

        if(

            window.innerHeight +
            window.scrollY

            >=

            document.body.offsetHeight - 200

        ){
            loadMoreSongs();
        }

    }
);

</script>

</body>

</html>
